<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tehillim Game — Learn Tehillim</title>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
    --navy: #001a4d;
    --navy-light: #003d99;
    --ink: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --bg: #f8fafc;
    --white: #ffffff;
    --gold: #b5924c;
    --gold-light: #f5edd8;
    --green: #166534;
    --green-bg: #dcfce7;
    --red: #991b1b;
    --red-bg: #fee2e2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    font-family: 'Cardo', serif;
    color: var(--ink);
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    background: rgba(0,26,77,0.93);
    backdrop-filter: blur(10px);
    color: white;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.navbar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
}
.navbar h1 { font-weight: 400; font-size: 20px; }
.nav-links { display: flex; align-items: center; }
.nav-links a {
    color: white; text-decoration: none;
    margin-left: 15px; padding: 8px 12px;
    border-radius: 8px; transition: all 0.3s ease;
    font-family: 'Assistant', sans-serif;
}
.nav-links a:hover { background: var(--navy-light); transform: translateY(-2px); }

/* GAME WRAPPER */
.game-wrapper {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
}

/* HEADER */
.game-header {
    text-align: center;
    margin-bottom: 40px;
}
.game-eyebrow {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
}
.game-title {
    font-size: clamp(24px, 3.5vw, 36px);
    font-weight: 400;
    color: var(--navy);
    margin-bottom: 8px;
}
.game-subtitle {
    font-family: 'Assistant', sans-serif;
    font-size: 14px;
    color: var(--muted);
}

/* STATS BAR */
.stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    justify-content: center;
    flex-wrap: wrap;
}
.stat-pill {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 7px 18px;
    font-family: 'Assistant', sans-serif;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
}
.stat-pill strong {
    color: var(--ink);
    font-weight: 600;
}
.stat-pill.streak strong { color: var(--gold); }
.stat-pill.correct strong { color: var(--green); }

/* PROGRESS BAR */
.round-progress {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 32px;
    overflow: hidden;
}
.round-progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.4s ease;
}

/* CARD */
.game-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,26,77,0.06);
}

.card-header {
    background: var(--navy);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.card-psalm-label {
    font-family: 'Assistant', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
}
.card-psalm-num {
    font-size: 15px;
    color: var(--gold);
}
.card-round {
    font-family: 'Assistant', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
}

.card-body { padding: 32px 28px; }

.prompt-label {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
}
.prompt-text {
    font-size: clamp(16px, 2.2vw, 20px);
    font-style: italic;
    line-height: 1.7;
    color: var(--navy);
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
}

.answer-label {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
}
.answer-input {
    width: 100%;
    padding: 16px 18px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    font-family: 'Cardo', serif;
    font-size: 17px;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    min-height: 90px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
}
.answer-input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(0,26,77,0.07);
}
.answer-input.correct-state {
    border-color: #16a34a;
    background: #f0fdf4;
    color: var(--green);
}
.answer-input.wrong-state {
    border-color: #dc2626;
    background: #fff8f8;
}

/* FEEDBACK */
.feedback-box {
    margin-top: 20px;
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'Assistant', sans-serif;
    font-size: 14px;
    display: none;
}
.feedback-box.correct {
    background: var(--green-bg);
    border: 1px solid #bbf7d0;
    color: var(--green);
    display: block;
}
.feedback-box.wrong {
    background: var(--red-bg);
    border: 1px solid #fecaca;
    color: var(--red);
    display: block;
}
.feedback-box.skipped {
    background: #fef9ee;
    border: 1px solid #fde68a;
    color: #92400e;
    display: block;
}
.feedback-correct-label {
    font-weight: 600;
    margin-bottom: 6px;
}
.feedback-answer {
    font-family: 'Cardo', serif;
    font-size: 16px;
    font-style: italic;
    line-height: 1.6;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(0,0,0,0.08);
}

/* ACTIONS */
.card-actions {
    padding: 0 28px 28px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.btn {
    font-family: 'Assistant', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
}
.btn-primary {
    background: var(--navy);
    color: white;
    flex: 1;
}
.btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
.btn-secondary {
    background: var(--white);
    color: var(--muted);
    border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--navy); color: var(--navy); }
.btn-gold {
    background: var(--gold);
    color: white;
    flex: 1;
}
.btn-gold:hover { background: #9e7a35; transform: translateY(-1px); }

/* RESULT SCREEN */
.result-screen {
    display: none;
    text-align: center;
    padding: 48px 28px;
}
.result-screen.visible { display: block; }
.result-trophy {
    font-size: 52px;
    margin-bottom: 16px;
    line-height: 1;
}
.result-title {
    font-size: 28px;
    font-weight: 400;
    color: var(--navy);
    margin-bottom: 8px;
}
.result-sub {
    font-family: 'Assistant', sans-serif;
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 32px;
}
.result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
    margin: 0 auto 32px;
}
.result-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px;
}
.result-stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
}
.result-stat-label {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
}
.result-stat.gold .result-stat-num { color: var(--gold); }
.result-stat.green .result-stat-num { color: var(--green); }

/* DIFFICULTY SELECT */
.difficulty-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
}
.diff-btn {
    font-family: 'Assistant', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
}
.diff-btn.active, .diff-btn:hover {
    border-color: var(--navy);
    color: var(--navy);
    background: #eef2fb;
}

/* DARK MODE */
.dark-mode {
    --bg: #0a0f1e;
    --white: #111827;
    --ink: #e2e8f0;
    --muted: #94a3b8;
    --border: #1e293b;
    --navy: #3b6fd4;
    --gold-light: #2a1f0a;
    background: var(--bg);
    color: var(--ink);
}
.dark-mode .navbar { background: rgba(5,10,30,0.95); }
.dark-mode .game-title { color: #c8d8f5; }
.dark-mode .prompt-text { color: #c8d8f5; }
.dark-mode .answer-input { background: #0d1526; color: var(--ink); }
.dark-mode .answer-input:focus { border-color: #4a7fff; }
.dark-mode .card-psalm-num { color: var(--gold); }
</style>
</head>
<body>

<div class="navbar">
    <div class="navbar-content">
        <h1>Learn Tehillim</h1>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="info.html">Info</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</div>

<div class="game-wrapper">

    <div class="game-header">
        <div class="game-eyebrow">תהילים · Challenge</div>
        <h2 class="game-title">What Comes Next?</h2>
        <p class="game-subtitle">Read the verse — type the one that follows.</p>
    </div>

    <div class="difficulty-bar">
        <button class="diff-btn active" data-diff="easy">Easy <span style="color:var(--muted);font-weight:400">(first 3 words)</span></button>
        <button class="diff-btn" data-diff="medium">Medium <span style="color:var(--muted);font-weight:400">(first word)</span></button>
        <button class="diff-btn" data-diff="hard">Hard <span style="color:var(--muted);font-weight:400">(no hints)</span></button>
    </div>

    <div class="stats-bar">
        <div class="stat-pill">Round <strong id="statRound">1</strong> / 10</div>
        <div class="stat-pill correct">Correct <strong id="statCorrect">0</strong></div>
        <div class="stat-pill streak">Streak <strong id="statStreak">0</strong></div>
    </div>

    <div class="round-progress">
        <div class="round-progress-fill" id="roundProgress" style="width:0%"></div>
    </div>

    <!-- GAME CARD -->
    <div class="game-card" id="gameCard">
        <div class="card-header">
            <div>
                <div class="card-psalm-label">Psalm</div>
                <div class="card-psalm-num" id="psalmNum">—</div>
            </div>
            <div class="card-round" id="cardRound">1 / 10</div>
        </div>

        <div class="card-body">
            <div class="prompt-label">The verse reads…</div>
            <div class="prompt-text" id="promptText">Loading…</div>

            <div class="answer-label" id="answerLabel">Type the next verse</div>
            <textarea class="answer-input" id="answerInput" placeholder="Begin typing…" rows="3"></textarea>

            <div class="feedback-box" id="feedbackBox">
                <div class="feedback-correct-label" id="feedbackLabel"></div>
                <div class="feedback-answer" id="feedbackAnswer"></div>
            </div>
        </div>

        <div class="card-actions" id="cardActions">
            <button class="btn btn-secondary" id="skipBtn" onclick="skip()">Skip</button>
            <button class="btn btn-primary" id="submitBtn" onclick="checkAnswer()">Check Answer</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div class="game-card result-screen" id="resultScreen">
        <div class="result-trophy" id="resultTrophy">🏆</div>
        <div class="result-title" id="resultTitle">Round Complete!</div>
        <div class="result-sub" id="resultSub"></div>
        <div class="result-stats">
            <div class="result-stat green">
                <div class="result-stat-num" id="resCorrect">0</div>
                <div class="result-stat-label">Correct</div>
            </div>
            <div class="result-stat">
                <div class="result-stat-num" id="resWrong">0</div>
                <div class="result-stat-label">Missed</div>
            </div>
            <div class="result-stat gold">
                <div class="result-stat-num" id="resBest">0</div>
                <div class="result-stat-label">Best Streak</div>
            </div>
        </div>
        <button class="btn btn-gold" style="max-width:260px;margin:0 auto;" onclick="startGame()">Play Again</button>
    </div>

</div>

 who do His will;"}, {"psalm": 103, "prompt": "bless the LORD, all His hosts, His servants who do His will;", "answer": "bless the LORD, all His works, through the length and breadth of His realm; bless the LORD, O my soul."}, {"psalm": 104, "prompt": "Bless the LORD, O my soul; O LORD, my God, You are very great; You are clothed in glory and majesty,", "answer": "wrapped in a robe of light; You spread the heavens like a tent cloth."}, {"psalm": 104, "prompt": "wrapped in a robe of light; You spread the heavens like a tent cloth.", "answer": "He sets the rafters of His lofts in the waters, makes the clouds His chariot, moves on the wings of the wind."}, {"psalm": 104, "prompt": "He sets the rafters of His lofts in the waters, makes the clouds His chariot, moves on the wings of the wind.", "answer": "He makes the winds His messengers, fiery flames His servants."}, {"psalm": 104, "prompt": "He makes the winds His messengers, fiery flames His servants.", "answer": "He established the earth on its foundations, so that it shall never totter."}, {"psalm": 104, "prompt": "He established the earth on its foundations, so that it shall never totter.", "answer": "You made the deep cover it as a garment; the waters stood above the mountains."}, {"psalm": 104, "prompt": "You made the deep cover it as a garment; the waters stood above the mountains.", "answer": "They fled at Your blast, rushed away at the sound of Your thunder,"}, {"psalm": 104, "prompt": "They fled at Your blast, rushed away at the sound of Your thunder,", "answer": "—mountains rising, valleys sinking— to the place You established for them."}, {"psalm": 104, "prompt": "—mountains rising, valleys sinking— to the place You established for them.", "answer": "You set bounds they must not pass so that they never again cover the earth."}, {"psalm": 104, "prompt": "You set bounds they must not pass so that they never again cover the earth.", "answer": "You make springs gush forth in torrents; they make their way between the hills,"}, {"psalm": 104, "prompt": "You make springs gush forth in torrents; they make their way between the hills,", "answer": "giving drink to all the wild beasts; the wild asses slake their thirst."}, {"psalm": 104, "prompt": "giving drink to all the wild beasts; the wild asses slake their thirst.", "answer": "The birds of the sky dwell beside them and sing among the foliage."}, {"psalm": 104, "prompt": "The birds of the sky dwell beside them and sing among the foliage.", "answer": "You water the mountains from Your ” lofts; the earth is sated from the fruit of Your work."}, {"psalm": 104, "prompt": "You water the mountains from Your ” lofts; the earth is sated from the fruit of Your work.", "answer": "You make the grass grow for the cattle, and herbage for man’s labor that he may get food out of the earth—"}, {"psalm": 104, "prompt": "You make the grass grow for the cattle, and herbage for man’s labor that he may get food out of the earth—", "answer": "The trees of the LORD drink their fill, the cedars of Lebanon, His own planting,"}, {"psalm": 104, "prompt": "The trees of the LORD drink their fill, the cedars of Lebanon, His own planting,", "answer": "where birds make their nests; the stork has her home in the junipers."}, {"psalm": 104, "prompt": "where birds make their nests; the stork has her home in the junipers.", "answer": "He made the moon to mark the seasons; the sun knows when to set."}, {"psalm": 104, "prompt": "He made the moon to mark the seasons; the sun knows when to set.", "answer": "You bring on darkness and it is night, when all the beasts of the forests stir."}, {"psalm": 104, "prompt": "You bring on darkness and it is night, when all the beasts of the forests stir.", "answer": "The lions roar for prey, seeking their food from God."}, {"psalm": 104, "prompt": "The lions roar for prey, seeking their food from God.", "answer": "When the sun rises, they come home and couch in their dens."}, {"psalm": 104, "prompt": "When the sun rises, they come home and couch in their dens.", "answer": "Man then goes out to his work, to his labor until the evening."}, {"psalm": 104, "prompt": "Man then goes out to his work, to his labor until the evening.", "answer": "How many are the things You have made, O LORD ; You have made them all with wisdom; the earth is full of Your creations."}, {"psalm": 104, "prompt": "How many are the things You have made, O LORD ; You have made them all with wisdom; the earth is full of Your creations.", "answer": "There is the sea, vast and wide, with its creatures beyond number, living things, small and great."}, {"psalm": 104, "prompt": "There is the sea, vast and wide, with its creatures beyond number, living things, small and great.", "answer": "There go the ships, and Leviathan that You formed to sport with."}, {"psalm": 104, "prompt": "There go the ships, and Leviathan that You formed to sport with.", "answer": "All of them look to You to give them their food when it is due."}, {"psalm": 104, "prompt": "All of them look to You to give them their food when it is due.", "answer": "Give it to them, they gather it up; open Your hand, they are well satisfied;"}, {"psalm": 104, "prompt": "Give it to them, they gather it up; open Your hand, they are well satisfied;", "answer": "hide Your face, they are terrified; take away their breath, they perish and turn again into dust;"}, {"psalm": 104, "prompt": "hide Your face, they are terrified; take away their breath, they perish and turn again into dust;", "answer": "send back Your breath, they are created, and You renew the face of the earth."}, {"psalm": 104, "prompt": "send back Your breath, they are created, and You renew the face of the earth.", "answer": "May the glory of the LORD endure forever; may the LORD rejoice in His works!"}, {"psalm": 104, "prompt": "May the glory of the LORD endure forever; may the LORD rejoice in His works!", "answer": "He looks at the earth and it trembles; He touches the mountains and they smoke."}, {"psalm": 104, "prompt": "He looks at the earth and it trembles; He touches the mountains and they smoke.", "answer": "I will sing to the LORD as long as I live; all my life I will chant hymns to my God."}, {"psalm": 104, "prompt": "I will sing to the LORD as long as I live; all my life I will chant hymns to my God.", "answer": "May my prayer be pleasing to Him; I will rejoice in the LORD."}, {"psalm": 104, "prompt": "May my prayer be pleasing to Him; I will rejoice in the LORD.", "answer": "May sinners disappear from the earth, and the wicked be no more. Bless the LORD, O my soul. Hallelujah."}, {"psalm": 105, "prompt": "Praise the LORD ; call on His name; proclaim His deeds among the peoples.", "answer": "Sing praises to Him; speak of all His wondrous acts."}, {"psalm": 105, "prompt": "Sing praises to Him; speak of all His wondrous acts.", "answer": "Exult in His holy name; let all who seek the LORD rejoice."}, {"psalm": 105, "prompt": "Exult in His holy name; let all who seek the LORD rejoice.", "answer": "Remember the wonders He has done, His portents and the judgments He has pronounced,"}, {"psalm": 105, "prompt": "Remember the wonders He has done, His portents and the judgments He has pronounced,", "answer": "O offspring of Abraham, His servant, O descendants of Jacob, His chosen ones."}, {"psalm": 105, "prompt": "O offspring of Abraham, His servant, O descendants of Jacob, His chosen ones.", "answer": "He is the LORD our God; His judgments are throughout the earth."}, {"psalm": 105, "prompt": "He is the LORD our God; His judgments are throughout the earth.", "answer": "He is ever mindful of His covenant, the promise He gave for a thousand generations,"}, {"psalm": 105, "prompt": "He is ever mindful of His covenant, the promise He gave for a thousand generations,", "answer": "that He made with Abraham, swore to Isaac,"}, {"psalm": 105, "prompt": "that He made with Abraham, swore to Isaac,", "answer": "and confirmed in a decree for Jacob, for Israel, as an eternal co  household, empowered him over all his possessions,", "answer": "to discipline his princes at will, to teach his elders wisdom."}, {"psalm": 105, "prompt": "to discipline his princes at will, to teach his elders wisdom.", "answer": "Then Israel came to Egypt; Jacob sojourned in the land of Ham."}, {"psalm": 105, "prompt": "Then Israel came to Egypt; Jacob sojourned in the land of Ham.", "answer": "He made His people very fruitful, more numerous than their foes."}, {"psalm": 105, "prompt": "He made His people very fruitful, more numerous than their foes.", "answer": "He sent His servant Moses, and Aaron, whom He had chosen."}, {"psalm": 105, "prompt": "He sent His servant Moses, and Aaron, whom He had chosen.", "answer": "They performed His signs among them, His wonders, against the land of Ham."}, {"psalm": 105, "prompt": "They performed His signs among them, His wonders, against the land of Ham.", "answer": "He turned their waters into blood and killed their fish."}, {"psalm": 105, "prompt": "He turned their waters into blood and killed their fish.", "answer": "Their land teemed with frogs, even the rooms of their king."}, {"psalm": 105, "prompt": "Their land teemed with frogs, even the rooms of their king.", "answer": "Swarms of insects came at His command, lice, throughout their country."}, {"psalm": 105, "prompt": "Swarms of insects came at His command, lice, throughout their country.", "answer": "He gave them hail for rain, and flaming fire in their land."}, {"psalm": 105, "prompt": "He gave them hail for rain, and flaming fire in their land.", "answer": "He struck their vines and fig trees, broke down the trees of their country."}, {"psalm": 105, "prompt": "He struck their vines and fig trees, broke down the trees of their country.", "answer": "Locusts came at His command, grasshoppers without number."}, {"psalm": 105, "prompt": "Locusts came at His command, grasshoppers without number.", "answer": "They devoured every green thing in the land; they consumed the produce of the soil."}, {"psalm": 105, "prompt": "They devoured every green thing in the land; they consumed the produce of the soil.", "answer": "He led Israel ” out with silver and gold; none among their tribes faltered."}, {"psalm": 105, "prompt": "He led Israel ” out with silver and gold; none among their tribes faltered.", "answer": "Egypt rejoiced when they left, for dread of Israel ” had fallen upon them."}, {"psalm": 105, "prompt": "Egypt rejoiced when they left, for dread of Israel ” had fallen upon them.", "answer": "He spread a cloud for a cover, and fire to light up the night."}, {"psalm": 105, "prompt": "He spread a cloud for a cover, and fire to light up the night.", "answer": "They asked and He brought them quail, and satisfied them with food from heaven."}, {"psalm": 105, "prompt": "They asked and He brought them quail, and satisfied them with food from heaven.", "answer": "He opened a rock so that water gushed forth; it flowed as a stream in the parched land."}, {"psalm": 105, "prompt": "He opened a rock so that water gushed forth; it flowed as a stream in the parched land.", "answer": "Mindful of His sacred promise to His servant Abraham,"}, {"psalm": 105, "prompt": "Mindful of His sacred promise to His servant Abraham,", "answer": "He led His people out in gladness, His chosen ones with joyous song."}, {"psalm": 105, "prompt": "He led His people out in gladness, His chosen ones with joyous song.", "answer": "He gave them the lands of nations; they inherited the wealth of peoples,"}, {"psalm": 105, "prompt": "He gave them the lands of nations; they inherited the wealth of peoples,", "answer": "that they might keep His laws and observe His teachings. Hallelujah."}, {"psalm": 106, "prompt": "Hallelujah. Praise the LORD for He is good; His steadfast love is eternal.", "answer": "Who can tell the mighty acts of the LORD, proclaim all His praises?"}, {"psalm": 106, "prompt": "Who can tell the mighty acts of the LORD, proclaim all His praises?", "answer": "Happy are those who act justly, who do right at all times."}, {"psalm": 106, "prompt": "Happy are those who act justly, who do right at all times.", "answer": "Be mindful of me, O LORD, when You favor Your people; take note of me when You deliver them,"}, {"psalm": 106, "prompt": "Be mindful of me, O LORD, when You favor Your people; take note of me when You deliver them,", "answer": "that I may enjoy the prosperity of Your chosen ones, share the joy of Your nation, glory in Your very own people."}, {"psalm": 106, "prompt": "that I may enjoy the prosperity of Your chosen ones, share the joy of Your nation, glory in Your very own people.", "answer": "We have sinned like our forefathers; we have gone astray, done evil."}, {"psalm": 106, "prompt": "We have sinned like our forefathers; we have gone astray, done evil.", "answer": "Our forefathers in Egypt did not perceive Your wonders; they did not remember Your abundant love, but rebelled at the sea, at the Sea of Reeds."}, {"psalm": 106, "prompt": "Our forefathers in Egypt did not perceive Your wonders; they did not remember Your abundant love, but rebelled at the sea, at the Sea of Reeds.", "answer": "Yet He saved them, as befits His name, to make known His might."}, {"psalm": 106, "prompt": "Yet He saved them, as befits His name, to make known His might.", "answer": "He sent His blast against the Sea of Reeds; it became dry; He led them through the deep as through a wilderness."}, {"psalm": 106, "prompt": "He sent His blast against the Sea of Reeds; it became dry; He led them through the deep as through a wilderness.", "answer": "He delivered them from the foe, redeemed them from the enemy."}, {"psalm": 106, "prompt": "He delivered them from the foe, redeemed them from the enemy.", "answer": "Water covered their adversaries; not one of them was left."}, {"psalm": 106, "prompt": "Water covered their adversaries; not one of them was left.", "answer": "Then they believed His promise, and sang His praises."}, {"psal stroy the nations as the LORD had commanded them,"}, {"psalm": 106, "prompt": "They did not destroy the nations as the LORD had commanded them,", "answer": "but mingled with the nations and learned their ways."}, {"psalm": 106, "prompt": "but mingled with the nations and learned their ways.", "answer": "They worshiped their idols, which became a snare for them."}, {"psalm": 106, "prompt": "They worshiped their idols, which became a snare for them.", "answer": "Their own sons and daughters they sacrificed to demons."}, {"psalm": 106, "prompt": "Their own sons and daughters they sacrificed to demons.", "answer": "They shed innocent blood, the blood of their sons and daughters, whom they sacrificed to the idols of Canaan; so the land was polluted with bloodguilt."}, {"psalm": 106, "prompt": "They shed innocent blood, the blood of their sons and daughters, whom they sacrificed to the idols of Canaan; so the land was polluted with bloodguilt.", "answer": "Thus they became defiled by their acts, debauched through their deeds."}, {"psalm": 106, "prompt": "Thus they became defiled by their acts, debauched through their deeds.", "answer": "The LORD was angry with His people and He abhorred His inheritance."}, {"psalm": 106, "prompt": "The LORD was angry with His people and He abhorred His inheritance.", "answer": "He handed them over to the nations; their foes ruled them."}, {"psalm": 106, "prompt": "He handed them over to the nations; their foes ruled them.", "answer": "Their enemies oppressed them and they were subject to their power."}, {"psalm": 106, "prompt": "Their enemies oppressed them and they were subject to their power.", "answer": "He saved them time and again, but they were deliberately rebellious, and so they were brought low by their iniquity."}, {"psalm": 106, "prompt": "He saved them time and again, but they were deliberately rebellious, and so they were brought low by their iniquity.", "answer": "When He saw that they were in distress, when He heard their c const ROUNDS = 10;
let queue = [];
let currentIdx = 0;
let correct = 0;
let wrong = 0;
let streak = 0;
let bestStreak = 0;
let difficulty = 'easy';
let answered = false;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getHint(answer) {
    if (difficulty === 'easy') {
        const words = answer.trim().split(/\s+/);
        return words.slice(0, 3).join(' ') + '…';
    } else if (difficulty === 'medium') {
        const words = answer.trim().split(/\s+/);
        return words[0] + '…';
    }
    return 'No hint in Hard mode.';
}

function normalize(str) {
    return str.toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function similarity(a, b) {
    const na = normalize(a);
    const nb = normalize(b);
    if (na === nb) return 1.0;
    // Check if answer contains most of the expected words
    const wordsA = na.split(' ');
    const wordsB = nb.split(' ');
    const matched = wordsA.filter(w => nb.includes(w)).length;
    return matched / wordsA.length;
}

function startGame() {
    queue = shuffle([...PSALM_PAIRS]).slice(0, ROUNDS);
    currentIdx = 0;
    correct = 0;
    wrong = 0;
    streak = 0;
    bestStreak = 0;
    answered = false;

    document.getElementById('resultScreen').classList.remove('visible');
    document.getElementById('gameCard').style.display = '';
    updateStats();
    showQuestion();
}

function showQuestion() {
    answered = false;
    const pair = queue[currentIdx];

    document.getElementById('psalmNum').textContent = pair.psalm;
    document.getElementById('cardRound').textContent = (currentIdx + 1) + ' / ' + ROUNDS;
    document.getElementById('promptText').textContent = pair.prompt;
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').className = 'answer-input';
    document.getElementById('answerInput').disabled = false;
    document.getElementById('answerInput').placeholder = 'Begin typing…';

    // Hint in label
    const hint = getHint(pair.answer);
    const lbl = document.getElementById('answerLabel');
    lbl.textContent = difficulty === 'hard' ? 'Type the next verse' : 'Type the next verse — starts: ' + hint;

    // Feedback reset
    const fb = document.getElementById('feedbackBox');
    fb.className = 'feedback-box';
    fb.style.display = 'none';

    // Buttons
    document.getElementById('skipBtn').style.display = '';
    document.getElementById('submitBtn').textContent = 'Check Answer';
    document.getElementById('submitBtn').onclick = checkAnswer;

    // Progress
    document.getElementById('roundProgress').style.width = (currentIdx / ROUNDS * 100) + '%';

    updateStats();
    document.getElementById('answerInput').focus();
}

function updateStats() {
    document.getElementById('statRound').textContent = currentIdx + 1;
    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statStreak').textContent = streak;
}

function checkAnswer() {
    if (answered) return;
    const input = document.getElementById('answerInput').value.trim();
    if (!input) {
        document.getElementById('answerInput').placeholder = 'Please type something first!';
        return;
    }

    answered = true;
    const pair = queue[currentIdx];
    const score = similarity(input, pair.answer);
    const isCorrect = score >= 0.6;

    const fb = document.getElementById('feedbackBox');
    const ta = document.getElementById('answerInput');

    if (isCorrect) {
        correct++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        ta.className = 'answer-input correct-state';
        fb.className = 'feedback-box correct';
        document.getElementById('feedbackLabel').textContent = streak > 1 ? '✓ Correct! ' + streak + ' in a row!' : '✓ Correct!';
        document.getElementById('feedbackAnswer').textContent = pair.answer;
    } else {
        wrong++;
        streak = 0;
        ta.className = 'answer-input wrong-state';
        fb.className = 'feedback-box wrong';
        document.getElementById('feedbackLabel').textContent = '✗ Not quite — the verse reads:';
        document.getElementById('feedbackAnswer').textContent = pair.answer;
    }
    fb.style.display = 'block';
    ta.disabled = true;

    document.getElementById('skipBtn').style.display = 'none';
    const nextBtn = document.getElementById('submitBtn');
    nextBtn.textContent = currentIdx + 1 < ROUNDS ? 'Next Verse →' : 'See Results';
    nextBtn.onclick = nextQuestion;
    updateStats();
}

function skip() {
    if (answered) return;
    answered = true;
    wrong++;
    streak = 0;
    const pair = queue[currentIdx];
    const fb = document.getElementById('feedbackBox');
    fb.className = 'feedback-box skipped';
    document.getElementById('feedbackLabel').textContent = 'Skipped — the verse reads:';
    document.getElementById('feedbackAnswer').textContent = pair.answer;
    fb.style.display = 'block';
    document.getElementById('answerInput').disabled = true;
    document.getElementById('skipBtn').style.display = 'none';
    const nextBtn = document.getElementById('submitBtn');
    nextBtn.textContent = currentIdx + 1 < ROUNDS ? 'Next Verse →' : 'See Results';
    nextBtn.onclick = nextQuestion;
    updateStats();
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx >= ROUNDS) {
        showResults();
    } else {
        showQuestion();
    }
}

function showResults() {
    document.getElementById('gameCard').style.display = 'none';
    const rs = document.getElementById('resultScreen');
    rs.classList.add('visible');

    document.getElementById('resCorrect').textContent = correct;
    document.getElementById('resWrong').textContent = wrong;
    document.getElementById('resBest').textContent = bestStreak;

    const pct = Math.round((correct / ROUNDS) * 100);
    let trophy = '📖';
    let title = 'Good effort!';
    if (pct === 100) { trophy = '🏆'; title = 'Perfect Score!'; }
    else if (pct >= 80) { trophy = '⭐'; title = 'Excellent!'; }
    else if (pct >= 60) { trophy = '✡'; title = 'Well done!'; }

    document.getElementById('resultTrophy').textContent = trophy;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultSub').textContent = pct + '% correct — ' + correct + ' out of ' + ROUNDS + ' verses';
    document.getElementById('roundProgress').style.width = '100%';
}

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.diff;
    });
});

// Enter to submit
document.getElementById('answerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) {
        if (!answered) checkAnswer();
        else nextQuestion();
    }
});

startGame();
