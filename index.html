<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Tehillim</title>

<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --navy: #001a4d;
    --navy-light: #003d99;
    --ink: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --bg: #f8fafc;
    --white: #ffffff;
    --gold: #b5924c;
    --gold-light: #f5edd8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    font-family: 'Cardo', serif;
    color: var(--ink);
    line-height: 1.6;
}

/* ── NAVBAR ── */
.navbar {
    background: rgba(0, 26, 77, 0.93);
    backdrop-filter: blur(10px);
    color: white;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.navbar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
}
.nav-links { display: flex; align-items: center; }
.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-family: 'Assistant', sans-serif;
}
.nav-links a:hover {
    background-color: var(--navy-light);
    transform: translateY(-2px);
}

/* HAMBURGER */
.hamburger {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    border-radius: 8px;
    padding: 6px;
    background: none;
    border: none;
    margin-left: 16px;
    flex-shrink: 0;
}
.hamburger:hover { background: rgba(255,255,255,0.12); }
.hamburger span {
    display: block;
    height: 2px;
    background: white;
    border-radius: 2px;
    transition: all 0.25s ease;
    transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* DROPDOWN */
.dropdown {
    display: none;
    position: absolute;
    right: 20px;
    top: calc(100% + 6px);
    background: rgba(0, 26, 77, 0.97);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px;
    min-width: 220px;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.dropdown.open { display: block; }
.dropdown-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 8px;
    border-radius: 8px;
}
.dropdown-row:hover { background: rgba(255,255,255,0.07); }
.dropdown-row label {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-family: 'Assistant', sans-serif;
}
.dropdown-row select {
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 13px;
    cursor: pointer;
}
.dropdown-row select option { background: #001a4d; color: white; }
.dropdown-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 6px 8px; }

/* TOGGLE SWITCH */
.toggle-switch { position: relative; width: 44px; height: 24px; }
.toggle-switch input { display: none; }
.toggle-slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.25s;
}
.toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.25s;
}
.toggle-switch input:checked + .toggle-slider { background: #4a7fff; }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

/* ── HERO ── */
.hero {
    text-align: center;
    padding: 72px 20px 48px;
}
.hero-eyebrow {
    font-family: 'Assistant', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
}
.hero h2 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 400;
    color: var(--navy);
    line-height: 1.25;
    margin-bottom: 12px;
}
.hero p {
    font-family: 'Assistant', sans-serif;
    color: var(--muted);
    font-size: 15px;
}

/* ── SCHEDULE SECTION ── */
.schedule-section {
    max-width: 860px;
    margin: 0 auto;
    padding: 56px 20px 48px;
    border-bottom: 1px solid var(--border);
}

.section-label {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

.schedule-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 10px;
}
.schedule-title {
    font-size: 22px;
    font-weight: 400;
    color: var(--navy);
}
.schedule-date {
    font-family: 'Assistant', sans-serif;
    font-size: 13px;
    color: var(--muted);
}

/* Today's highlight */
.today-card {
    background: var(--navy);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
}
.today-tag {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
}
.today-psalms {
    font-size: 26px;
    color: white;
    font-weight: 400;
    margin-bottom: 4px;
}
.today-sub {
    font-family: 'Assistant', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
}
.today-count { text-align: center; }
.today-count-num {
    font-size: 42px;
    color: var(--gold);
    line-height: 1;
    font-weight: 700;
}
.today-count-label {
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
}

/* Weekly grid */
.week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}
.day-cell {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    color: inherit;
    display: block;
}
.day-cell:hover {
    border-color: var(--navy);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,26,77,0.08);
}
.day-cell.active {
    background: var(--gold-light);
    border-color: var(--gold);
}
.day-name {
    font-family: 'Assistant', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
}
.day-cell.active .day-name { color: var(--gold); }
.day-psalms {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.3;
}
.day-cell.active .day-psalms { color: var(--navy); font-weight: 600; }
.day-count {
    font-family: 'Assistant', sans-serif;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
}

/* Progress bar */
.progress-wrap {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
}
.progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.6s ease;
}
.progress-label {
    font-family: 'Assistant', sans-serif;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
}

/* ── SEARCH ── */
.search-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 0;
}
.search-wrap { position: relative; }
.search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 15px;
}
#searchBar {
    width: 100%;
    padding: 14px 18px 14px 42px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--white);
    font-family: 'Assistant', sans-serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
}
#searchBar:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(0,26,77,0.07);
}

/* TOGGLE BUTTON */
.toggle-container {
    text-align: center;
    margin-top: 20px;
}
#toggleButton {
    padding: 9px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-family: 'Assistant', sans-serif;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
}
#toggleButton:hover { border-color: var(--navy); color: var(--navy); }

/* ── CARDS ── */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 20px 60px;
}
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 32px;
}
.card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s ease;
    border: 1px solid var(--border);
}
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,26,77,0.09);
    border-color: #c8d4e8;
}
.card-title { font-size: 16px; color: var(--navy); }
.card:nth-child(4n+1) { border-top: 2px solid #94a3b8; }
.card:nth-child(4n+2) { border-top: 2px solid #a3a380; }
.card:nth-child(4n+3) { border-top: 2px solid var(--gold); }
.card:nth-child(4n+4) { border-top: 2px solid #9c6644; }

/* ── DARK MODE ── */
.dark-mode {
    --bg: #0a0f1e;
    --white: #111827;
    --ink: #e2e8f0;
    --muted: #94a3b8;
    --border: #1e293b;
    --navy: #3b6fd4;
    --gold-light: #2a1f0a;
    background: var(--bg);
    color: var(--ink);
}
.dark-mode .navbar { background: rgba(5, 10, 30, 0.95); }
.dark-mode .hero h2 { color: #c8d8f5; }
.dark-mode .today-card { background: #0f1e45; }
.dark-mode .schedule-title { color: #c8d8f5; }
.dark-mode #searchBar { background: var(--white); color: var(--ink); border-color: var(--border); }
.dark-mode #searchBar:focus { border-color: #4a7fff; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .today-card { flex-direction: column; }
    .nav-links a { display: none; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-content">
        <h1 style="font-family:'Cardo',serif; font-weight:400; font-size:20px;">Learn Tehillim</h1>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="game.html">Tehillim Game</a>
            <a href="info.html">Info</a>
            <a href="contact.html">Contact</a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Open menu">
            <span></span><span></span><span></span>
        </button>
        <div class="dropdown" id="dropdown">
            <div class="dropdown-row">
                <label for="languageSelect">Language</label>
                <select id="languageSelect">
                    <option value="en">English</option>
                    <option value="he">Hebrew</option>
                </select>
            </div>
            <div class="dropdown-row">
                <label for="nusachSelect">Nusach</label>
                <select id="nusachSelect">
                    <option>Ashkenazi</option>
                    <option>Yemeni</option>
                    <option>Yerushalmi</option>
                    <option>Moroccan</option>
                </select>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-row">
                <label for="darkToggle">Dark mode</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="darkToggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-eyebrow">תהילים · Tehillim</div>
    <h2>The Psalms of David HaMelech</h2>

</div>

<!-- DAILY SCHEDULE -->
<section class="schedule-section">
    <div class="section-label">Daily Schedule</div>

    <div class="schedule-header">
        <div class="schedule-title">This Week's Portion</div>
        <div class="schedule-date" id="currentDate"></div>
    </div>

    <div class="today-card">
        <div class="today-left">
            <div class="today-tag">Today</div>
            <div class="today-psalms" id="todayPsalms">—</div>
            <div class="today-sub" id="todayDayName">Loading…</div>
        </div>
        <div class="today-count">
            <div class="today-count-num" id="todayCount">—</div>
            <div class="today-count-label">Psalms today</div>
        </div>
    </div>

    <div class="week-grid" id="weekGrid"></div>

    <div class="progress-wrap">
        <span class="progress-label" id="progressLabel">Week progress</span>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progressPct">0%</span>
    </div>
</section>

<!-- SEARCH + CARDS -->
<div class="search-container">
    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchBar" placeholder="Search by psalm number…">
    </div>
</div>

<div class="toggle-container">
    <button id="toggleButton">Hide all Psalms</button>
</div>

<div class="container">
    <div class="cards-grid" id="TehillimCards"></div>
</div>

<script>
/* ── SCHEDULE DATA ──
   Weekly cycle: each day covers a portion of the 150 psalms */
const weekSchedule = [
    { day: 'Sun',  full: 'Sunday',    range: [1,   29],  count: 29 },
    { day: 'Mon',  full: 'Monday',    range: [30,  50],  count: 21 },
    { day: 'Tue',  full: 'Tuesday',   range: [51,  72],  count: 22 },
    { day: 'Wed',  full: 'Wednesday', range: [73,  89],  count: 17 },
    { day: 'Thu',  full: 'Thursday',  range: [90,  106], count: 17 },
    { day: 'Fri',  full: 'Friday',    range: [107, 119], count: 13 },
    { day: 'Shab', full: 'Shabbat',   range: [120, 150], count: 31 },
];

const today = new Date();
const jsDay = today.getDay();
const months = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

document.getElementById('currentDate').textContent =
    months[today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear();

const todayData = weekSchedule[jsDay];
document.getElementById('todayPsalms').textContent =
    'Psalms ' + todayData.range[0] + '\u2013' + todayData.range[1];
document.getElementById('todayDayName').textContent = todayData.full;
document.getElementById('todayCount').textContent = todayData.count;

const grid = document.getElementById('weekGrid');
weekSchedule.forEach((d, i) => {
    const cell = document.createElement('a');
    cell.className = 'day-cell' + (i === jsDay ? ' active' : '');
    cell.href = 'Tehillim' + d.range[0] + '.html';
    cell.innerHTML =
        '<div class="day-name">' + d.day + '</div>' +
        '<div class="day-psalms">' + d.range[0] + '\u2013' + d.range[1] + '</div>' +
        '<div class="day-count">' + d.count + ' psalms</div>';
    grid.appendChild(cell);
});

const pct = Math.round(((jsDay + 1) / 7) * 100);
document.getElementById('progressFill').style.width = pct + '%';
document.getElementById('progressPct').textContent = pct + '%';
document.getElementById('progressLabel').textContent = (jsDay + 1) + ' of 7 days';

/* ── CARDS ── */
const TehillimData = Array.from({length:150}, (_,i) => ({ num: i+1 }));
const cardsContainer = document.getElementById('TehillimCards');
const searchBar = document.getElementById('searchBar');

function renderCards(data) {
    cardsContainer.innerHTML = '';
    data.forEach(t => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = 'Tehillim' + t.num + '.html';
        card.innerHTML = '<div class="card-title">Tehillim ' + t.num + '</div>';
        cardsContainer.appendChild(card);
    });
}

searchBar.addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderCards(TehillimData.filter(t => t.num.toString().includes(q)));
});

renderCards(TehillimData);

/* ── TOGGLE ── */
const toggleButton = document.getElementById('toggleButton');
let visible = true;
toggleButton.onclick = () => {
    visible = !visible;
    cardsContainer.style.display = visible ? 'grid' : 'none';
    toggleButton.textContent = visible ? 'Hide all Psalms' : 'Show all Psalms';
};

/* ── HAMBURGER ── */
const hamburger = document.getElementById('hamburger');
const dropdown = document.getElementById('dropdown');
hamburger.addEventListener('click', e => {
    e.stopPropagation();
    hamburger.classList.toggle('open');
    dropdown.classList.toggle('open');
});
document.addEventListener('click', e => {
    if (!hamburger.contains(e.target) && !dropdown.contains(e.target)) {
        hamburger.classList.remove('open');
        dropdown.classList.remove('open');
    }
});

/* ── DARK MODE ── */
document.getElementById('darkToggle').addEventListener('change', e => {
    document.body.classList.toggle('dark-mode', e.target.checked);
});
</script>

</body>
</html>
