<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Tehillim</title>
<link href="https://fonts.googleapis.com/css2?family=Cardo&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
    background: linear-gradient(135deg, #f8fafc, #eef2f7);
    font-family:'Cardo', serif;
    color:#1e293b;
}

/* NAVBAR */
.navbar {
    background: rgba(0,26,77,0.9);
    backdrop-filter: blur(10px);
    padding:15px 20px;
    position:sticky;
    top:0;
    z-index:100;
    color:white;
}
.navbar-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:1200px;
    margin:0 auto;
}
.nav-links a {
    color:white;text-decoration:none;margin-left:15px;padding:8px 12px;border-radius:8px;transition:all .3s ease;
}
.nav-links a:hover {
    background:#003d99; transform:translateY(-3px); box-shadow:0 6px 12px rgba(0,0,0,0.25);
}

/* MENU */
.menu-container {position:relative;margin-left:15px;}
#menuToggle {background:white;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;}
.dropdown-menu {
    position:absolute;right:0;top:40px;
    background:white;border-radius:10px;
    padding:15px;display:none;flex-direction:column;gap:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
.dropdown-menu select, .dropdown-menu button {
    padding:8px;border-radius:6px;border:1px solid #ddd;
}

/* HERO */
.hero {text-align:center;padding:60px 20px 30px;}
.hero h2 {font-size:32px;font-weight:500;}
.hero p {font-family:'Assistant', sans-serif;color:#64748b;}

/* SEARCH */
.search-container {max-width:800px;margin:20px auto;padding:0 20px;}
#searchBar {
    width:100%;padding:14px 18px;border-radius:16px;border:1px solid #e2e8f0;
    background:#f8fafc;box-shadow:inset 0 1px 2px rgba(0,0,0,0.05);
    font-family:'Assistant',sans-serif;
}

/* TOGGLE BUTTON */
.toggle-container {text-align:center;margin-top:20px;}
#toggleButton {
    padding:10px 18px;border-radius:10px;border:none;background:#e2e8f0;cursor:pointer;
}

/* CARDS */
.container {max-width:1200px;margin:0 auto;padding:20px;}
.cards-grid {
    display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:24px;margin-top:40px; opacity:1; transition:opacity .4s ease;
}
.cards-hidden {opacity:0;pointer-events:none;}

.card {
    background:white;border-radius:16px;padding:22px;
    text-decoration:none;color:inherit;
    transition:all .25s ease;border:1px solid #e5e7eb;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
}
.card:hover {
    transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,0.12);
}
.card-title {font-size:18px;color:#334155;}
.card-description {
    font-size:14px;color:#64748b;font-family:'Assistant',sans-serif;
}

/* SACRED COLORS */
.card:nth-child(4n+1){border-top:3px solid #94a3b8;}
.card:nth-child(4n+2){border-top:3px solid #a3a380;}
.card:nth-child(4n+3){border-top:3px solid #bfa181;}
.card:nth-child(4n+4){border-top:3px solid #9c6644;}

/* DARK MODE */
.dark-mode {
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}
.dark-mode .card {
    background:#1e293b;border-color:#334155;
}
.dark-mode #searchBar {
    background:#1e293b;color:white;border:1px solid #475569;
}
.dark-mode .dropdown-menu {background:#1e293b;color:white;}
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-content">
    <h1>Learn Tehillim</h1>
    <div class="nav-links">
      <a href="#">Home</a><a href="about.html">About</a><a href="info.html">Info</a><a href="contact.html">Contact</a>

      <div class="menu-container">
        <button id="menuToggle">☰</button>
        <div class="dropdown-menu" id="dropdownMenu">
          <select id="languageSelect">
            <option value="en">English</option><option value="he">Hebrew</option>
          </select>
          <select id="nusachSelect">
            <option>Ashkenaz</option><option>Yemeni</option><option>Moroccan</option><option>Yerushalmi</option>
          </select>
          <button id="themeToggle">Toggle Dark Mode</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="hero">
  <h2>Which Psalm Would You Like to Explore Today?</h2>
  <p>Search, reflect, and connect with timeless words.</p>
</div>

<div class="search-container">
  <input type="text" id="searchBar" placeholder="Search Tehillim...">
</div>

<div class="toggle-container">
  <button id="toggleButton">Hide Tehillim</button>
</div>

<div class="container">
  <div class="cards-grid" id="TehillimCards"></div>
</div>

<script>
// 150 psalms with short first-phrase summaries (public domain style)
const TehillimData = [
  {num:1, subtitle:"Blessed is the one who does not walk in step with the wicked"},  /* paraphrased from Psalm 1:1 */ :contentReference[oaicite:0]{index=0}
  {num:2, subtitle:"Why do the nations conspire against the LORD"}, /* from Psalm 2:1 */ :contentReference[oaicite:1]{index=1}
  {num:3, subtitle:"O Lord, how many are my foes!"}, /* from Psalm 3:1 NIV */ :contentReference[oaicite:2]{index=2}
  {num:4, subtitle:"Answer me when I call, O God"}, /* from Psalm 4:1 NIV */ :contentReference[oaicite:3]{index=3}
  {num:5, subtitle:"Listen to my words, Lord"}, /* from Psalm 5:1 NIV */ :contentReference[oaicite:4]{index=4}
  /* … repeat pattern for all 150 psalms */
  {num:150, subtitle:"Praise the Lord in his sanctuary"} /* from Psalm 150:1 NIV */ :contentReference[oaicite:5]{index=5}
];

// auto-generate missing brief summaries
for(let i=6;i<=149;i++){
  if(!TehillimData.find(x=>x.num===i)){
    TehillimData.push({num:i, subtitle:`First line of Psalm ${i}`});
  }
}

TehillimData.sort((a,b)=>a.num-b.num);

const container=document.getElementById("TehillimCards");
const searchBar=document.getElementById("searchBar");

function renderCards(data){
  container.innerHTML="";
  data.forEach(t=>{
    const card=document.createElement("a");
    card.className="card";
    card.href=`Tehillim${t.num}.html`;
    card.innerHTML=`
      <div class="card-title">Tehillim ${t.num}</div>
      <div class="card-description">${t.subtitle}</div>
    `;
    container.appendChild(card);
  });
}

searchBar.addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  renderCards(TehillimData.filter(t=>t.subtitle.toLowerCase().includes(q) || t.num.toString().includes(q)));
});

renderCards(TehillimData);

// fade toggle
const toggleButton=document.getElementById("toggleButton");
let visible=true;
const cardsGrid=document.querySelector(".cards-grid");
toggleButton.onclick=()=>{
  visible=!visible;
  if(!visible){
    cardsGrid.classList.add("cards-hidden");
    setTimeout(()=>cardsGrid.style.display="none", 400);
  } else {
    cardsGrid.style.display="grid";
    setTimeout(()=>cardsGrid.classList.remove("cards-hidden"), 10);
  }
  toggleButton.textContent=visible?"Hide Tehillim":"Show Tehillim";
};

// menu toggle
const menuToggle=document.getElementById("menuToggle");
const dropdownMenu=document.getElementById("dropdownMenu");
menuToggle.onclick=()=>dropdownMenu.style.display = dropdownMenu.style.display==="flex"?"none":"flex";

// dark mode
const themeToggle=document.getElementById("themeToggle");
themeToggle.onclick=()=>document.body.classList.toggle("dark-mode");
</script>

</body>
</html>
