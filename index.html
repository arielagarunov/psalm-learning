<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Tehillim</title>

<link href="https://fonts.googleapis.com/css2?family=Cardo&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    font-family: 'Cardo', serif;
    color: #1f2937;
}

/* NAVBAR */
.navbar {
    background: rgba(0, 26, 77, 0.9);
    backdrop-filter: blur(10px);
    color: white;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.navbar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
}

.navbar-content h1 {
    font-size: 26px;
    font-weight: 400;
}

/* NAV LINKS */
.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    padding: 8px 12px;
    border-radius: 10px;
    font-family: 'Assistant', sans-serif;
    transition: all 0.25s ease;
}

.nav-links a:hover {
    background-color: rgba(255,255,255,0.15);
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
}

/* SELECTS + BUTTON */
.nav-links select,
#themeToggle {
    margin-left: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    font-family: 'Assistant', sans-serif;
    cursor: pointer;
}

#themeToggle {
    font-size: 16px;
}

/* SEARCH */
.search-container {
    max-width: 900px;
    margin: 40px auto 20px;
    padding: 0 20px;
}

#searchBar {
    width: 100%;
    padding: 14px 18px;
    font-size: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Assistant', sans-serif;
    background: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: all 0.25s ease;
}

#searchBar:focus {
    outline: none;
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* GRID */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
    margin-top: 30px;
}

/* CARDS */
.card {
    background: white;
    border-radius: 18px;
    padding: 22px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    color: inherit;
    display: block;

    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 18px 40px rgba(0,0,0,0.15);
}

/* COLOR STRIPS */
.card:nth-child(4n+1) { border-top: 4px solid #6366f1; }
.card:nth-child(4n+2) { border-top: 4px solid #22c55e; }
.card:nth-child(4n+3) { border-top: 4px solid #f59e0b; }
.card:nth-child(4n+4) { border-top: 4px solid #ef4444; }

.card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1e3a8a;
}

.card-description {
    font-size: 14px;
    color: #6b7280;
    font-family: 'Assistant', sans-serif;
}

.no-results {
    text-align: center;
    padding: 40px;
    color: #888;
}

/* DARK MODE */
.dark-mode {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e5e7eb;
}

.dark-mode .card {
    background: #1e293b;
    border-color: #334155;
}

.dark-mode #searchBar {
    background: #1e293b;
    color: white;
}

.dark-mode .card-description {
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="navbar-content">
        <h1>Learn Tehillim</h1>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="info.html">Info</a>
            <a href="contact.html">Contact</a>

            <select id="languageSelect">
                <option value="en">EN</option>
                <option value="he">HE</option>
            </select>

            <select id="nusachSelect">
                <option value="ashkenaz">Ashkenaz</option>
                <option value="sefard">Sefard</option>
                <option value="edot">Edot Mizrach</option>
            </select>

            <button id="themeToggle">🌙</button>
        </nav>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchBar" placeholder="Search Tehillim...">
</div>

<div class="container">
    <div class="cards-grid" id="TehillimCards"></div>
    <div id="noResults" class="no-results" style="display:none;">No results found</div>
</div>

<script>
const TehillimData = Array.from({length:150}, (_,i)=>({
    num: i+1,
    title: "Tehillim " + (i+1)
}));

const container = document.getElementById('TehillimCards');
const searchBar = document.getElementById('searchBar');
const noResults = document.getElementById('noResults');

function renderCards(data) {
    container.innerHTML = '';
    if (data.length === 0) {
        noResults.style.display = 'block';
        return;
    }
    noResults.style.display = 'none';

    data.forEach(t => {
        const card = document.createElement('a');
        card.href = `Tehillim${t.num}.html`;
        card.className = 'card';

        card.innerHTML = `
            <div class="card-title">Tehillim ${t.num}</div>
            <div class="card-description">Click to learn</div>
        `;

        container.appendChild(card);
    });
}

searchBar.addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    const filtered = TehillimData.filter(t =>
        t.num.toString().includes(q)
    );
    renderCards(filtered);
});

renderCards(TehillimData);

/* DARK MODE */
const themeToggle = document.getElementById('themeToggle');

if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
    themeToggle.textContent = '☀️';
}

themeToggle.onclick = () => {
    document.body.classList.toggle('dark-mode');

    if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme','dark');
        themeToggle.textContent = '☀️';
    } else {
        localStorage.setItem('theme','light');
        themeToggle.textContent = '🌙';
    }
};

/* SAVE SETTINGS */
document.getElementById('languageSelect').onchange = e =>
    localStorage.setItem('language', e.target.value);

document.getElementById('nusachSelect').onchange = e =>
    localStorage.setItem('nusach', e.target.value);
</script>

</body>
</html>
